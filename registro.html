<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta - Core Cloud</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f4f4f9; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .label-esq { text-align: left; width: 90%; margin: 0 auto; display: block; font-size: 14px; color: #555; margin-bottom: -5px; margin-top: 5px;}
        button { width: 90%; padding: 10px; background: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; margin-top: 15px; }
        button:hover { background: #218838; }
        .link-voltar { display: block; margin-top: 15px; color: #007bff; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Nova Conta - Core Cloud</h2>
        
        <form id="registroForm">
            <input type="text" id="nome" placeholder="Nome completo" required>
            <input type="tel" id="telefone" placeholder="Telefone (Ex: 31999999999)" required>
            <input type="text" id="cpf" placeholder="CPF (Apenas números)" required>
            
            <label class="label-esq" for="nascimento">Data de nascimento:</label>
            <input type="date" id="nascimento" required>
            
            <input type="email" id="email" placeholder="E-mail" required>
            <input type="password" id="senha" placeholder="Crie uma senha (mínimo 6 caracteres)" required>
            
            <button type="submit">Criar Conta</button>
        </form>

        <a href="index.html" class="link-voltar">Já tem uma conta? Faça login</a>
    </div>
	
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // Lembre-se de colar as suas chaves aqui
        const firebaseConfig = {
            apiKey: "AIzaSyC6fo9PVQ5nYjXRezXCo_kgC5DcbL5o8o4",
			authDomain: "corenexa-9d938.firebaseapp.com",
			projectId: "corenexa-9d938",
			storageBucket: "corenexa-9d938.firebasestorage.app",
			messagingSenderId: "342666577648",
			appId: "1:342666577648:web:775809b2f0bcac02f1a435"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        document.getElementById('registroForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Capturando os valores dos novos campos
            const nome = document.getElementById('nome').value;
            const telefone = document.getElementById('telefone').value;
            const cpf = document.getElementById('cpf').value;
            const nascimento = document.getElementById('nascimento').value;
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;

            // Alterando o botão visualmente durante o carregamento
            const botao = document.querySelector('button');
            botao.innerText = "Criando conta...";
            botao.disabled = true;

            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, senha);
                const user = userCredential.user;

                // Limpa o CPF (tira pontos e traços para usar como ID)
                const cpfLimpo = cpf.replace(/\D/g, '');

                // 1. Salva os dados completos do cliente vinculados ao UID
                await setDoc(doc(db, "usuarios", user.uid), {
                    nomeCompleto: nome,
                    telefone: telefone,
                    cpf: cpfLimpo, // Salva limpo
                    dataNascimento: nascimento,
                    email: email,
                    downloadUrl: "", 
                    statusAtivo: true,
                    criadoEm: new Date().toISOString()
                });

                // 2. NOVA ETAPA: Cria a "Ponte" para o login por CPF
                // Cria um documento onde o ID é o CPF, guardando o email dele
                await setDoc(doc(db, "cpfs_emails", cpfLimpo), {
                    emailVinculado: email
                });

                alert("Conta criada com sucesso! Você já pode fazer o login.");
                window.location.href = "index.html"; 

            } catch (error) {
                // Restaura o botão em caso de erro
                botao.innerText = "Criar Conta";
                botao.disabled = false;

                if(error.code === 'auth/email-already-in-use') {
                    alert("Este e-mail já está cadastrado no sistema.");
                } else if(error.code === 'auth/weak-password') {
                    alert("A senha é muito fraca. Use pelo menos 6 caracteres.");
                } else {
                    alert("Erro ao criar conta: " + error.message);
                }
            }
			
			// Máscara para CPF (000.000.000-00)
			document.getElementById('cpf').addEventListener('input', (e) => {
            let valor = e.target.value.replace(/\D/g, ""); // Remove tudo que não é número
            valor = valor.replace(/(\d{3})(\d)/, "$1.$2"); // Coloca o primeiro ponto
            valor = valor.replace(/(\d{3})(\d)/, "$1.$2"); // Coloca o segundo ponto
            valor = valor.replace(/(\d{3})(\d{1,2})$/, "$1-$2"); // Coloca o traço
            e.target.value = valor;
        });
        });
    </script>
</body>
</html>
