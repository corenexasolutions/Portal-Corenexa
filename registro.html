<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta - CoreNexa</title>
    <link rel="icon" href="img/ico.png" type="image/png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <img src="img/ico.png" alt="CoreNexa Logo" class="portal-logo">
            <h2>Nova Conta</h2>
            <form id="registroForm">
                <div class="form-group"><input type="text" id="nome" placeholder="Nome completo" required></div>
                <div class="form-group"><input type="tel" id="telefone" placeholder="Telefone" required></div>
                <div class="form-group"><input type="text" id="cpf" placeholder="CPF" required></div>
                <div class="form-group"><label>Data de nascimento:</label><input type="date" id="nascimento" required></div>
                <div class="form-group"><input type="email" id="email" placeholder="E-mail" required></div>
                <div class="form-group"><input type="password" id="senha" placeholder="Crie uma senha" minlength="6" required></div>
                
                <button type="submit" class="btn-submit">Criar Conta</button>
            </form>
            <div class="auth-links">
                <p style="margin-top: 15px;">Já tem conta? <a href="index.html">Faça login</a></p>
            </div>
        </div>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
