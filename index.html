<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CoreNexa</title>
    <link rel="icon" href="img/ico.png" type="image/png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <img src="img/ico.png" alt="CoreNexa Logo" class="portal-logo">
            <h2>Acesso ao Portal</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label>E-mail ou CPF</label>
                    <input type="text" id="identificador" placeholder="Digite seu e-mail ou CPF" required>
                </div>
                <div class="form-group">
                    <label>Senha</label>
                    <input type="password" id="senha" placeholder="Sua senha" required>
                </div>
                <button type="submit" class="btn-submit">Entrar</button>
            </form>
            <div class="auth-links">
                <p><a href="recuperar-senha.html">Esqueceu a senha?</a></p>
                <p style="margin-top: 10px;">Não tem conta? <a href="registro.html">Criar agora</a></p>
            </div>
        </div>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
