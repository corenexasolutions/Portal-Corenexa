<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha - CoreNexa</title>
    <link rel="icon" href="img/ico.png" type="image/png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <img src="img/ico.png" alt="CoreNexa Logo" class="portal-logo">
            <h2>Recuperar Senha</h2>
            <p style="font-size: 14px; color: #666; margin-bottom: 20px;">Enviaremos um link de recuperação para o seu e-mail.</p>
            
            <form id="recuperarForm">
                <div class="form-group">
                    <input type="email" id="email" placeholder="Seu e-mail cadastrado" required>
                </div>
                <button type="submit" class="btn-submit">Enviar Link</button>
            </form>
            <div id="mensagemSucesso" style="display: none; color: #16a34a; font-weight: bold; margin-top: 20px;">E-mail enviado com sucesso! Verifique sua caixa de entrada.</div>
            
            <div class="auth-links">
                <p style="margin-top: 15px;"><a href="index.html">Voltar para o Login</a></p>
            </div>
        </div>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
